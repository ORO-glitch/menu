<!doctype html>
<html lang="ar">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ORO Cafe</title>

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    :root {
      --gold: #c69a2f;
      --gold-strong: #ffd24d;
      --gold-dark: #8c6a1a;
      --muted: #e9e6e0;
      --bg-dark: #050405;
      --error-red: #ff4757;
    }

    body {
      margin: 0;
      padding: 0;
      background: var(--bg-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .error-container {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      width: 100%;
    }

    .error-content {
      text-align: center;
      max-width: 600px;
      background: linear-gradient(135deg, rgba(255,71,87,0.1), rgba(198,154,47,0.05));
      border: 2px solid rgba(255,71,87,0.2);
      border-radius: 16px;
      padding: 50px 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .error-icon {
      font-size: 80px;
      color: var(--error-red);
      margin-bottom: 20px;
      animation: shake 0.5s ease-in-out;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }

    .error-content h1 {
      color: var(--error-red);
      font-size: 36px;
      margin: 0 0 15px 0;
      font-weight: 800;
    }

    .error-content .message {
      color: var(--muted);
      font-size: 16px;
      line-height: 1.8;
      margin: 0;
    }

    .footer-note {
      color: var(--muted);
      font-size: 12px;
      margin-top: 20px;
      opacity: 0.7;
    }

    @media (max-width: 600px) {
      .error-content {
        padding: 30px 20px;
      }
      .error-content h1 { font-size: 28px; }
      .error-icon { font-size: 60px; }
    }
  </style>
</head>
<body>
  <div class="error-container">
    <div class="error-content">
      <div class="error-icon">
        <i class="fas fa-times-circle"></i>
      </div>

      <h1>لم يتم الدفع</h1>
      
      <div class="message">
        <p>عذراً، لم تكتمل عملية الدفع بنجاح.</p>
        <p>يرجى التحقق من بيانات بطاقتك والمحاولة مرة أخرى.</p>
      </div>

      <div class="footer-note">
        <p>© 2026 ORO Cafe - جميع الحقوق محفوظة</p>
      </div>
    </div>
  </div>
</body>
</html>
